apiVersion: apps/v1
kind: Deployment
metadata:
  name: events
  labels:
    app: events
spec:
  replicas: {{ .Values.gateway.events.replicas }}
  selector:
    matchLabels:
      app: events
  template:
    metadata:
      labels:
        app: events
    spec:
      containers:
        - name: events
          image: {{ .Values.gateway.events.image }}
          imagePullPolicy: Never
          env:
            - name: DB_HOST
              value: {{ .Values.gateway.db.host | quote }}
            - name: DB_PORT
              value: {{ .Values.gateway.db.port | quote }}
            - name: DB_NAME
              value: {{ .Values.gateway.db.name | quote }}
            - name: DB_USER
              value: {{ .Values.gateway.db.user | quote }}
            - name: DB_PASS
              value: {{ .Values.gateway.db.password | quote }}
            - name: DB_MAX_CONNS
              value: "10"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_TIMEOUT_MS
              value: "1000"
            - name: RESERVATION_TTL
              value: "300"
          ports:
            - containerPort: 8081
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
