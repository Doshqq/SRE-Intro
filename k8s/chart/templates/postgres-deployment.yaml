apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          env:
            - name: POSTGRES_DB
              value: {{ .Values.gateway.db.name | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.gateway.db.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.gateway.db.password | quote }}
          ports:
            - containerPort: 5432
