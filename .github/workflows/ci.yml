name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    if: "!startsWith(github.event.head_commit.message, 'ci:')"
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway image
        run: |
          ACTOR_LOWER=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/${ACTOR_LOWER}/quickticket-gateway:${{ github.sha }} ./app/gateway
          docker push ghcr.io/${ACTOR_LOWER}/quickticket-gateway:${{ github.sha }}

      - name: Build and push events image
        run: |
          ACTOR_LOWER=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/${ACTOR_LOWER}/quickticket-events:${{ github.sha }} ./app/events
          docker push ghcr.io/${ACTOR_LOWER}/quickticket-events:${{ github.sha }}

      - name: Build and push payments image
        run: |
          ACTOR_LOWER=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/${ACTOR_LOWER}/quickticket-payments:${{ github.sha }} ./app/payments
          docker push ghcr.io/${ACTOR_LOWER}/quickticket-payments:${{ github.sha }}

      - name: Update image tags in manifests
        run: |
          SHA=${{ github.sha }}
          ACTOR_LOWER=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')
          sed -i "s|image: ghcr.io/.*/quickticket-gateway:.*|image: ghcr.io/${ACTOR_LOWER}/quickticket-gateway:${SHA}|" k8s/gateway.yaml
          sed -i "s|image: ghcr.io/.*/quickticket-events:.*|image: ghcr.io/${ACTOR_LOWER}/quickticket-events:${SHA}|" k8s/events.yaml
          sed -i "s|image: ghcr.io/.*/quickticket-payments:.*|image: ghcr.io/${ACTOR_LOWER}/quickticket-payments:${SHA}|" k8s/payments.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f k8s/
          git diff --cached --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
